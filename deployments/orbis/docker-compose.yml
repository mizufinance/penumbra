services:
  sourcehub:
    image: ${SOURCEHUB_IMAGE:-ghcr.io/sourcenetwork/sourcehub:dev}
    platform: linux/amd64
    container_name: sourcehub-integration-test
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rm -rf /home/node/.sourcehub/*
        sourcehubd init local-node --chain-id sourcehub-localnet --home /home/node/.sourcehub
        sourcehubd keys add validator --keyring-backend test --home /home/node/.sourcehub
        echo "abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about" | sourcehubd keys add test --recover --keyring-backend test --home /home/node/.sourcehub
        sourcehubd genesis add-genesis-account validator 100000000000uopen --keyring-backend test --home /home/node/.sourcehub
        sourcehubd genesis add-genesis-account test 100000000000uopen --keyring-backend test --home /home/node/.sourcehub
        sourcehubd genesis gentx validator 10000000000uopen --keyring-backend test --chain-id sourcehub-localnet --home /home/node/.sourcehub
        sourcehubd genesis collect-gentxs --home /home/node/.sourcehub
        exec sourcehubd start --home /home/node/.sourcehub --rpc.laddr tcp://0.0.0.0:26657 --api.enable --api.address tcp://0.0.0.0:1317
    ports:
      - "26657:26657"
      - "26656:26656"
      - "1317:1317"
      - "9090:9090"
    networks:
      - orbis-integration-network
    healthcheck:
      test: ["CMD", "sourcehubd", "status", "--home", "/home/node/.sourcehub"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  node1:
    build:
      context: https://github.com/sourcenetwork/orbis-rs.git#d5889bd777bbac7bf97a8e89a2556116f2740ceb
      dockerfile: docker/Dockerfile
      args:
        ENABLE_INTEGRATION_TEST: "true"
        CRYPTO_FEATURE: "${ORBIS_INTEGRATION_CRYPTO:-decaf377}"
    container_name: orbis-integration-node-1
    environment:
      - ORBIS_PASSWORD=testpassword123
      - ORBIS_SECRET_KEY=testsecret1testsecret1
      - RUST_LOG=debug
    command: ["--addr", "0.0.0.0:50051", "--log-level", "debug", "--authz-grpc", "http://sourcehub:9090", "--bulletin-grpc", "http://sourcehub:9090", "--chain-rpc", "http://sourcehub:26657", "--chain-rest", "http://sourcehub:1317", "--metrics-addr", "0.0.0.0:9090", "--reshare-interval-secs", "5"]
    ports:
      - "50051:50051"
      - "9091:9090"
    networks:
      - orbis-integration-network
    depends_on:
      sourcehub:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  node2:
    build:
      context: https://github.com/sourcenetwork/orbis-rs.git#d5889bd777bbac7bf97a8e89a2556116f2740ceb
      dockerfile: docker/Dockerfile
      args:
        ENABLE_INTEGRATION_TEST: "true"
        CRYPTO_FEATURE: "${ORBIS_INTEGRATION_CRYPTO:-decaf377}"
    container_name: orbis-integration-node-2
    environment:
      - ORBIS_PASSWORD=testpassword123
      - ORBIS_SECRET_KEY=testsecret2testsecret2
      - RUST_LOG=debug
    command: ["--addr", "0.0.0.0:50051", "--log-level", "debug", "--authz-grpc", "http://sourcehub:9090", "--bulletin-grpc", "http://sourcehub:9090", "--chain-rpc", "http://sourcehub:26657", "--chain-rest", "http://sourcehub:1317", "--metrics-addr", "0.0.0.0:9090", "--reshare-interval-secs", "5"]
    ports:
      - "50052:50051"
      - "9092:9090"
    networks:
      - orbis-integration-network
    depends_on:
      sourcehub:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  node3:
    build:
      context: https://github.com/sourcenetwork/orbis-rs.git#d5889bd777bbac7bf97a8e89a2556116f2740ceb
      dockerfile: docker/Dockerfile
      args:
        ENABLE_INTEGRATION_TEST: "true"
        CRYPTO_FEATURE: "${ORBIS_INTEGRATION_CRYPTO:-decaf377}"
    container_name: orbis-integration-node-3
    environment:
      - ORBIS_PASSWORD=testpassword123
      - ORBIS_SECRET_KEY=testsecret3testsecret3
      - RUST_LOG=debug
    command: ["--addr", "0.0.0.0:50051", "--log-level", "debug", "--authz-grpc", "http://sourcehub:9090", "--bulletin-grpc", "http://sourcehub:9090", "--chain-rpc", "http://sourcehub:26657", "--chain-rest", "http://sourcehub:1317", "--metrics-addr", "0.0.0.0:9090", "--reshare-interval-secs", "5"]
    ports:
      - "50053:50051"
      - "9093:9090"
    networks:
      - orbis-integration-network
    depends_on:
      sourcehub:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

networks:
  orbis-integration-network:
    driver: bridge
