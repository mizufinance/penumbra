---
# A process-compose configuration for running a local Penumbra devnet.
# Only handles the barebones pd/cometbft combination for a functional
# node. Other process-compose configs can be layered on to add more robust
# functionality, such as event indexing, or metrics ingestion.

version: "0.5"

# Env vars set here will be accessible to all processes.
environment:
  - "RUST_BACKTRACE=1"
  - "RUST_LOG=info,network_integration=debug,pclientd=debug,pcli=info,pd=debug,penumbra=debug,penumbra_sdk_app::server::mempool=trace,tower_abci=debug"

log_level: info
is_strict: true
# Interleave logs from all services in single file, so it's greppable.
log_location: deployments/logs/dev-env-combined.log

processes:
  # Run pd validator based on generated network.
  pd:
    command: cargo run --release --bin pd -- start --home ${PENUMBRA_DEVNET_HOME}/network_data/node0/pd --grpc-bind 0.0.0.0:${PENUMBRA_PD_GRPC_PORT} --cometbft-addr ${PENUMBRA_NODE_CMT_URL}
    readiness_probe:
      http_get:
        host: 127.0.0.1
        scheme: http
        path: "/"
        port: ${PENUMBRA_PD_GRPC_PORT}
      failure_threshold: 2
      initial_delay_seconds: 5
      period_seconds: 5

  # Run CometBFT for consensus driver.
  cometbft:
    command: cometbft --log_level=debug --home ${PENUMBRA_DEVNET_HOME}/network_data/node0/cometbft start
    readiness_probe:
      http_get:
        host: 127.0.0.1
        scheme: http
        path: "/"
        port: ${PENUMBRA_COMETBFT_RPC_PORT}
      failure_threshold: 2
      initial_delay_seconds: 5
      period_seconds: 5
    depends_on:
      pd:
        condition: process_healthy
