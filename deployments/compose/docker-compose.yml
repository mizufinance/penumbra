# docker-compose file for running a single-validator Penumbra local network.
#
# Genesis account mnemonic (for pcli wallet recovery):
#   decorate bright ozone fork gallery riot bus exhaust worth way bone indoor
#   calm squirrel merry zero scheme cotton until shop any excess stage laundry
#
# Usage:
#   docker compose -f deployments/compose/docker-compose.yml up -d
#
# To reset and start fresh:
#   docker compose -f deployments/compose/docker-compose.yml down -v

networks:
  penumbra:
    driver: bridge

services:

  # Initialize network config
  pd-network-init:
    image: ghcr.io/mizufinance/penumbra:local
    networks:
      - penumbra
    command:
      - sh
      - -c
      - |
        pd --version
        if ! test -e /pd/network_data/node0/cometbft/config/config.toml ; then
          echo "WARN: network config not found. Creating fresh single-validator network."
          rm -rf /pd/network_data
          /bin/pd network --network-dir /pd/network_data generate \
            --chain-id penumbra-local-devnet \
            --preserve-chain-id \
            --gas-price-simple 1000 \
            --unbonding-delay 100 \
            --epoch-duration 100 \
            --proposal-voting-blocks 50 \
            --timeout-commit 500ms \
            --validators-input-file /localnet/validators-1.json \
            --allocations-input-file /localnet/allocations.csv
          # Clear seeds for single-validator mode (no peers needed)
          sed -i 's/^seeds = .*/seeds = ""/' /pd/network_data/node0/cometbft/config/config.toml
        else
          echo 'Network config already found, using it'
        fi
        mkdir -p /pd/network_data/node0/cometbft/data
        chown 100 -R /pd/network_data/node0/cometbft
        chown 1000 -R /pd/network_data/node0/pd
        ls -l /pd/network_data/
        if test -d /pd/network_data/node0 ; then
          exit 0
        else
          echo 'ERROR: network generation failed - expected node0 directory'
          exit 1
        fi
    restart: on-failure
    volumes:
      - penumbra-pd-node0:/pd
      - ../000-localnet:/localnet:ro
    user: "0"

  # Penumbra daemon
  pd-node0:
    image: ghcr.io/mizufinance/penumbra:local
    networks:
      penumbra:
        aliases:
          - pd-node0
    command: >-
      /bin/pd start --home /pd/network_data/node0/pd
      --grpc-bind 0.0.0.0:8080 --abci-bind 0.0.0.0:26658
      --cometbft-addr http://cometbft-node0:26657
    restart: on-failure
    volumes:
      - penumbra-pd-node0:/pd
    user: "${UID:-1000}"
    stop_signal: SIGKILL
    depends_on:
      pd-network-init:
        condition: service_completed_successfully
    ports:
      - "26658:26658"
      - "8080:8080"

  # CometBFT node
  cometbft-node0:
    image: "docker.io/cometbft/cometbft:v0.37.15"
    networks:
      penumbra:
        aliases:
          - cometbft-node0
          - validator-0
    ports:
      - "26656:26656"
      - "26657:26657"
    volumes:
      - penumbra-pd-node0:/cometbft
    user: "100"
    environment:
      CMTHOME: /cometbft/network_data/node0/cometbft
    command: start --proxy_app=tcp://pd-node0:26658
    restart: on-failure
    depends_on:
      - pd-node0

volumes:
  penumbra-pd-node0: {}
