# docker-compose file for running a 2-validator Penumbra local network.
#
# Genesis account mnemonic (for pcli wallet recovery):
#   decorate bright ozone fork gallery riot bus exhaust worth way bone indoor
#   calm squirrel merry zero scheme cotton until shop any excess stage laundry
#
# Stores node configs in docker "volumes", which should be
# reset between networks: `docker volume rm compose_penumbra-pd-node0 compose_penumbra-pd-node1`
#
# Usage:
#   docker compose -f deployments/compose/docker-compose.yml up -d
#
# To reset and start fresh:
#   docker compose -f deployments/compose/docker-compose.yml down -v
#   docker compose -f deployments/compose/docker-compose.yml up -d

networks:
  penumbra:
    driver: bridge

services:

  # Initialize network config for both validators
  pd-network-init:
    image: ghcr.io/penumbra-zone/penumbra:local
    networks:
      - penumbra
    command:
      - sh
      - -c
      - |
        pd --version
        if ! test -e /pd/network_data/node0/cometbft/config/config.toml ; then
          echo 'WARN: network config not found. Creating fresh 2-validator network.'
          rm -rf /pd/network_data
          /bin/pd network --network-dir /pd/network_data generate \
            --chain-id penumbra-local-devnet \
            --preserve-chain-id \
            --gas-price-simple 0 \
            --unbonding-delay 100 \
            --epoch-duration 100 \
            --proposal-voting-blocks 50 \
            --timeout-commit 500ms \
            --validators-input-file /localnet/validators.json \
            --allocations-input-file /localnet/allocations.csv \
            --peer-address-template validator
        else
          echo 'Network config already found, using it'
        fi
        if test -d /pd/network_data/node0 && test -d /pd/network_data/node1 ; then
          mkdir -p /pd/network_data/node0/cometbft/data
          mkdir -p /pd/network_data/node1/cometbft/data
          chown 100 -R /pd/network_data/node0/cometbft
          chown 100 -R /pd/network_data/node1/cometbft
          chown 1000 -R /pd/network_data/node0/pd
          chown 1000 -R /pd/network_data/node1/pd
          ls -l /pd/network_data/
          exit 0
        else
          echo 'ERROR: network generation failed - expected node0 and node1 directories'
          exit 1
        fi
    restart: on-failure
    volumes:
      - penumbra-pd-node0:/pd
      - ../000-localnet:/localnet:ro
    user: "0"

  # Copy node1 data to its own volume
  pd-node1-copy:
    image: ghcr.io/penumbra-zone/penumbra:local
    networks:
      - penumbra
    command:
      - sh
      - -c
      - |
        if ! test -e /pd1/network_data/node1/cometbft/config/config.toml ; then
          echo 'Copying node1 config from shared volume...'
          mkdir -p /pd1/network_data
          cp -r /pd0/network_data/node1 /pd1/network_data/
          chown 100 -R /pd1/network_data/node1/cometbft
          chown 1000 -R /pd1/network_data/node1/pd
          ls -l /pd1/network_data/node1/
        else
          echo 'Node1 config already exists'
        fi
    restart: on-failure
    volumes:
      - penumbra-pd-node0:/pd0:ro
      - penumbra-pd-node1:/pd1
    user: "0"
    depends_on:
      pd-network-init:
        condition: service_completed_successfully

  # Validator 0 - Penumbra daemon
  pd-node0:
    image: ghcr.io/penumbra-zone/penumbra:local
    networks:
      penumbra:
        aliases:
          - pd-node0
    command: >-
      /bin/pd start --home /pd/network_data/node0/pd
      --grpc-bind 0.0.0.0:8080 --abci-bind 0.0.0.0:26658
      --cometbft-addr http://cometbft-node0:26657
    restart: on-failure
    volumes:
      - penumbra-pd-node0:/pd
    user: "${UID:-1000}"
    stop_signal: SIGKILL
    depends_on:
      pd-network-init:
        condition: service_completed_successfully
    ports:
      - "26658:26658"
      - "8080:8080"

  # Validator 1 - Penumbra daemon
  pd-node1:
    image: ghcr.io/penumbra-zone/penumbra:local
    networks:
      penumbra:
        aliases:
          - pd-node1
    command: >-
      /bin/pd start --home /pd/network_data/node1/pd
      --grpc-bind 0.0.0.0:8080 --abci-bind 0.0.0.0:26658
      --cometbft-addr http://cometbft-node1:26657
    restart: on-failure
    volumes:
      - penumbra-pd-node1:/pd
    user: "${UID:-1000}"
    stop_signal: SIGKILL
    depends_on:
      pd-node1-copy:
        condition: service_completed_successfully
    ports:
      - "26668:26658"
      - "8081:8080"

  # Validator 0 - CometBFT node
  # Waits for both pd nodes before starting so peer addresses can resolve
  cometbft-node0:
    image: "docker.io/cometbft/cometbft:v0.37.15"
    networks:
      penumbra:
        aliases:
          - cometbft-node0
          - validator-0
    ports:
      - "26656:26656"
      - "26657:26657"
    volumes:
      - penumbra-pd-node0:/cometbft
    user: "100"
    environment:
      CMTHOME: /cometbft/network_data/node0/cometbft
    command: start --proxy_app=tcp://pd-node0:26658
    restart: on-failure
    depends_on:
      - pd-node0
      - pd-node1

  # Validator 1 - CometBFT node
  cometbft-node1:
    image: "docker.io/cometbft/cometbft:v0.37.15"
    networks:
      penumbra:
        aliases:
          - cometbft-node1
          - validator-1
    ports:
      - "26666:26656"
      - "26667:26657"
    volumes:
      - penumbra-pd-node1:/cometbft
    user: "100"
    environment:
      CMTHOME: /cometbft/network_data/node1/cometbft
    command: start --proxy_app=tcp://pd-node1:26658
    restart: on-failure
    depends_on:
      - pd-node0
      - pd-node1

volumes:
  penumbra-pd-node0: {}
  penumbra-pd-node1: {}
