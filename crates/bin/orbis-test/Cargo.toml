[package]
name = "orbis-test"
version = "2.1.0"
authors = ["Penumbra Labs <team@penumbralabs.xyz"]
edition = "2021"
description = "Integration test for Orbis DKG, DLEQ, and PRE against real orbis-nodes"
repository = "https://github.com/penumbra-zone/penumbra"
license = "MIT OR Apache-2.0"
publish = false

[features]
default = ["demo"]
demo = ["penumbra-sdk-keys/demo"]

[dependencies]
anyhow = "1.0.75"
ark-groth16 = { version = "0.4.0", default-features = false }
ark-serialize = "0.4.2"
ark-snark = "0.4.0"
async-trait = "0.1.52"
clap = { version = "3.2", features = ["derive", "env"] }
cnidarium = { version = "0.83", default-features = false }
decaf377 = { version = "0.10.1", default-features = true }
hex = "0.4.3"
rand_core = "0.6.4"
sha2 = "0.10"
serde = { version = "1.0.186", features = ["derive"] }
serde_json = "1.0.96"
tokio = { version = "1.39.0", features = ["full"] }

penumbra-sdk-app = { path = "../../core/app" }
penumbra-sdk-asset = { default-features = false, path = "../../core/asset" }
penumbra-sdk-compliance = { default-features = false, path = "../../core/component/compliance" }
penumbra-sdk-keys = { default-features = false, path = "../../core/keys" }
penumbra-sdk-mock-client = { path = "../../test/mock-client" }
penumbra-sdk-num = { default-features = false, path = "../../core/num" }
penumbra-sdk-proof-params = { default-features = false, path = "../../crypto/proof-params" }
penumbra-sdk-shielded-pool = { default-features = false, path = "../../core/component/shielded-pool" }
penumbra-sdk-tct = { default-features = false, path = "../../crypto/tct" }
penumbra-sdk-test-subscriber = { path = "../../test/tracing-subscriber" }
penumbra-sdk-transaction = { default-features = false, path = "../../core/transaction" }
penumbra-sdk-view = { path = "../../view" }

crypto = { path = "../../../../orbis-rs/crates/crypto", default-features = false, features = ["decaf377", "test-helpers"] }
bulletin = { path = "../../../../orbis-rs/crates/bulletin", default-features = false }
authz = { path = "../../../../orbis-rs/crates/authz", default-features = false }
