hex = { workspace = true }
orbis-authn = { package = "authn", git = "https://github.com/sourcenetwork/orbis-rs", rev = "e20d30232b4fa65b196d6c0ac7c7d862731a96e8" }
orbis-common = { package = "common", git = "https://github.com/sourcenetwork/orbis-rs", rev = "e20d30232b4fa65b196d6c0ac7c7d862731a96e8" }
penumbra-orbis-client = { workspace = true }
penumbra-sdk-compliance = { workspace = true, features = ["component", "sqlite-bundled"] }
