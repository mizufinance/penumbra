[package]
name = "orbis-ring-test"
version = {workspace = true}
authors = {workspace = true}
edition = {workspace = true}
description = "Penumbra-side crypto for Orbis ring integration tests"
repository = {workspace = true}
license = {workspace = true}
publish = false

[features]
default = ["demo"]
demo = ["penumbra-sdk-keys/demo"]

[dependencies]
anyhow = {workspace = true}
clap = {workspace = true, features = ["derive", "env"]}
decaf377 = {workspace = true, default-features = true}
hex = {workspace = true}
poseidon377 = {workspace = true}
rand_core = {workspace = true}
serde_json = {workspace = true}

penumbra-sdk-asset = {workspace = true, default-features = false}
penumbra-sdk-compliance = {workspace = true, default-features = false}
penumbra-sdk-keys = {workspace = true, default-features = false}
penumbra-sdk-num = {workspace = true, default-features = false}
