[package]
name = "orbis-audit"
version = {workspace = true}
authors = {workspace = true}
edition = {workspace = true}
description = "Orbis PRE audit tool — replaces orbis-sim with real Orbis node interaction"
repository = {workspace = true}
license = {workspace = true}
publish = false

[features]
default = ["demo"]
demo = ["penumbra-sdk-keys/demo"]

[dependencies]
anyhow = {workspace = true}
clap = {workspace = true, features = ["derive", "env"]}
decaf377 = {workspace = true, default-features = true}
hex = {workspace = true}
serde = {workspace = true, features = ["derive"]}
serde_json = {workspace = true}
tokio = {workspace = true, features = ["full"]}
tonic = {workspace = true}
url = {workspace = true}

penumbra-sdk-asset = {workspace = true, default-features = false}
penumbra-sdk-compliance = {workspace = true, default-features = false}
penumbra-sdk-keys = {workspace = true, default-features = false}
penumbra-sdk-num = {workspace = true, default-features = false}
penumbra-sdk-proto = {workspace = true, features = ["rpc"], default-features = true}
