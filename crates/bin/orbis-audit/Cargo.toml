[package]
name = "orbis-audit"
version = { workspace = true }
authors = { workspace = true }
edition = { workspace = true }
description = "Orbis PRE audit tool for transfer-only compliance"
repository = { workspace = true }
license = { workspace = true }
publish = false

[features]
default = ["demo"]
demo = ["penumbra-sdk-keys/demo"]

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive", "env"] }
decaf377 = { workspace = true, default-features = true }
did-key = "0.2.1"
hex = { workspace = true }
orbis-authn = { package = "authn", git = "https://github.com/sourcenetwork/orbis-rs", rev = "e20d30232b4fa65b196d6c0ac7c7d862731a96e8" }
orbis-common = { package = "common", git = "https://github.com/sourcenetwork/orbis-rs", rev = "e20d30232b4fa65b196d6c0ac7c7d862731a96e8" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tonic = { workspace = true }
url = { workspace = true }

penumbra-orbis-client = { workspace = true }
penumbra-sdk-compliance = { workspace = true, default-features = false }
penumbra-sdk-asset = { workspace = true, default-features = false }
penumbra-sdk-keys = { workspace = true, default-features = false }
penumbra-sdk-num = { workspace = true, default-features = false }
penumbra-sdk-proto = { workspace = true, features = ["rpc"], default-features = true }
poseidon377 = { workspace = true }
rand_core = { workspace = true }
